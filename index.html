<style>
:root{
  --bg:#06080B; --panel:#0E1218; --panel2:#151B24; --line:#1E2731;
  --text:#EAF0F6; --muted:#7F8B9C; --faint:#4A5563;
  --accent:#2DE2E6; --accent-ink:#06181A; --hot:#FF6A3D;
  --grey:#39424E; --green:#2FD27A; --amber:#FFC23D; --red:#FF4D6D; --blue:#3B9EFF; --gold:#F4C84A; --violet:#A87BFF;
  --r:16px; --rs:11px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{background:var(--bg); color:var(--text); font-family:'Sora',system-ui,sans-serif; font-size:15px; line-height:1.45; padding-bottom:86px;
  background-image:radial-gradient(900px 500px at 80% -10%, rgba(45,226,230,.07), transparent 60%),radial-gradient(700px 500px at -10% 10%, rgba(255,106,61,.05), transparent 55%); background-attachment:fixed;}
.mono{font-family:'JetBrains Mono',monospace;}
.app{max-width:520px; margin:0 auto; padding:0 16px; position:relative; z-index:1;}
h1,h2,h3{margin:0; font-weight:700; letter-spacing:-.01em;}
button{font-family:inherit; cursor:pointer; border:none; color:inherit;}
.muted{color:var(--muted);} .tiny{font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted);}
.top{display:flex; align-items:center; justify-content:space-between; padding:18px 0 8px;}
.brand{display:flex; align-items:center; gap:10px; font-weight:800;}
.brand .dot{width:12px; height:12px; border-radius:50%; background:var(--accent); box-shadow:0 0 16px var(--accent);}
.brand small{display:block; font-weight:500; font-size:10px; letter-spacing:.22em; color:var(--muted); text-transform:uppercase;}
.modepill{font-size:11px; padding:6px 11px; border-radius:999px; border:1px solid var(--line); color:var(--accent); background:rgba(45,226,230,.06);}
.weekstrip{display:flex; gap:6px; margin:10px 0 4px;}
.day{flex:1; text-align:center; padding:9px 0 8px; border-radius:var(--rs); background:var(--panel); border:1px solid var(--line);}
.day b{display:block; font-size:11px; color:var(--muted);} .day .pip{margin:5px auto 0; width:9px; height:9px; border-radius:50%; background:var(--grey);}
.day.done .pip{background:var(--green); box-shadow:0 0 10px var(--green);} .day.today{border-color:var(--accent); background:rgba(45,226,230,.06);} .day.today b{color:var(--accent);}
.card{background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:16px; margin:12px 0;}
.card.glow{border-color:rgba(45,226,230,.4); box-shadow:0 0 0 1px rgba(45,226,230,.12), 0 14px 50px rgba(45,226,230,.10);}
.cta{width:100%; padding:20px; border-radius:var(--r); font-weight:800; font-size:18px; color:var(--accent-ink); background:linear-gradient(135deg,#48ECEF,#2DE2E6 55%,#16B8BC); box-shadow:0 12px 40px rgba(45,226,230,.30); display:flex; align-items:center; justify-content:center; gap:10px;}
.cta:active{transform:translateY(1px);} .cta .sub{display:block; font-size:11px; font-weight:600; letter-spacing:.06em; opacity:.7; text-transform:uppercase;}
.cta.secondary{background:var(--panel2); color:var(--text); border:1px solid var(--line); box-shadow:none; font-size:15px; padding:15px;}
.btn{padding:11px 14px; border-radius:var(--rs); background:var(--panel2); border:1px solid var(--line); font-weight:600; font-size:14px;}
.btn.accent{background:var(--accent); color:var(--accent-ink); border-color:transparent;} .btn.ghost{background:transparent;}
.btn.sm{padding:7px 10px; font-size:12px;} .btn.full{width:100%;} .btn.danger{color:var(--red); border-color:rgba(255,77,109,.3);}
.row{display:flex; gap:8px;} .row.wrap{flex-wrap:wrap;}
.resume{background:linear-gradient(135deg,rgba(255,106,61,.16),rgba(255,106,61,.05)); border:1px solid rgba(255,106,61,.5);}
.exline{display:flex; align-items:center; justify-content:space-between; padding:11px 0; border-top:1px solid var(--line);} .exline:first-child{border-top:none;}
.exline .nm{font-weight:600;} .exline .meta{font-size:12px; color:var(--muted);}
.sets{font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--accent); background:rgba(45,226,230,.08); padding:3px 9px; border-radius:8px; white-space:nowrap;}
.tag{display:inline-block; font-size:10px; padding:2px 7px; border-radius:6px; background:var(--panel2); color:var(--muted); margin-left:6px;}
.tag.love{color:var(--gold);} .tag.avoid{color:var(--red);}
.logex{margin:12px 0;} .logex .hd{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;} .logex .hd .nm{font-weight:700; font-size:16px;}
.exacts{display:flex; gap:6px; margin-top:8px; flex-wrap:wrap;}
.exacts button{font-size:11px; padding:6px 9px; border-radius:8px; background:var(--panel2); border:1px solid var(--line); color:var(--muted); display:flex; align-items:center; gap:4px;}
.exacts button.swap{color:var(--accent);} .exacts button.rm{color:var(--red);}
.histline{font-size:12px; color:var(--muted); margin-top:3px;} .histline b{color:#AEB9C7; font-weight:600;} .target{color:var(--accent); font-weight:600;}
.setgrid{margin-top:11px;}
.sethead,.setrow{display:grid; grid-template-columns:30px 1fr 1fr 52px; gap:8px; align-items:center;}
.sethead{font-size:10px; letter-spacing:.07em; text-transform:uppercase; color:var(--faint); margin-bottom:5px; padding:0 2px;}
.setrow{margin-bottom:7px;} .setrow .sn{cursor:pointer; -webkit-user-select:none; user-select:none; font-family:'JetBrains Mono',monospace; color:var(--muted); font-size:13px; text-align:center;}
.setrow.warm .sn{color:var(--amber);}
.inp{width:100%; background:var(--panel2); border:1px solid var(--line); border-radius:9px; color:var(--text); padding:11px 8px; font-family:'JetBrains Mono',monospace; font-size:16px; text-align:center;}
.inp:focus{outline:none; border-color:var(--accent);}
.chk{width:52px; height:48px; border-radius:10px; border:1px solid var(--line); background:var(--panel2); display:flex; align-items:center; justify-content:center; font-size:20px; color:var(--faint);}
.chk.on{background:var(--green); border-color:transparent; color:#04190E;}
.wbtn{width:38px; height:40px; border-radius:9px; border:1px solid var(--line); background:var(--panel2); color:var(--faint); font-size:11px; font-weight:700;}
.wbtn.on{color:var(--amber); border-color:var(--amber);}
.win{display:inline-flex; gap:6px; flex-wrap:wrap; margin-top:9px;}
.badge{font-size:10.5px; padding:4px 9px; border-radius:999px; font-weight:700;}
.badge.pr{background:var(--gold); color:#241B02;} .badge.beat{background:rgba(47,210,122,.16); color:var(--green); border:1px solid rgba(47,210,122,.4);}
.badge.warnb{background:rgba(255,77,109,.14); color:var(--red); border:1px solid rgba(255,77,109,.35);}

.rest .pill{pointer-events:auto; background:var(--panel2); border:1px solid var(--accent); border-radius:999px; padding:10px 14px; display:flex; align-items:center; gap:12px; box-shadow:0 10px 30px rgba(0,0,0,.5);}
.rest .t{font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:700; color:var(--accent); min-width:62px; text-align:center;}
.rest button{background:transparent; color:var(--muted); font-size:13px; padding:4px 8px;}
.sheet-wrap{position:fixed; inset:0; z-index:60; background:rgba(2,4,7,.7); display:flex; align-items:flex-end; justify-content:center;}
.sheet{background:var(--panel); border:1px solid var(--line); border-radius:20px 20px 0 0; width:100%; max-width:520px; max-height:85vh; overflow-y:auto; padding:18px 16px calc(20px + env(safe-area-inset-bottom));}
.sheet .grab{width:40px; height:4px; border-radius:2px; background:var(--line); margin:0 auto 12px;}
.opt{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:13px; border:1px solid var(--line); border-radius:12px; margin-bottom:8px; background:var(--panel2);}
.opt .nm{font-weight:600;} .opt .meta{font-size:11.5px; color:var(--muted);}
.mgrid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px;}
.mcard{background:var(--panel2); border:1px solid var(--line); border-radius:12px; padding:11px; cursor:pointer; position:relative; overflow:hidden;}
.mcard .bartop{position:absolute; top:0; left:0; right:0; height:4px;}
.mcard .mlabel{font-weight:600; font-size:13.5px; margin-top:3px;}
.mcard .stat{font-family:'JetBrains Mono',monospace; font-size:18px; margin-top:4px;}
.mcard .gb{font-size:9px; padding:2px 6px; border-radius:5px; margin-top:6px; display:inline-block; font-weight:700;}
.statuspill{font-size:10px; padding:3px 8px; border-radius:999px; font-weight:700; white-space:nowrap;}

.tabbar{position:fixed; left:0; right:0; bottom:0; z-index:50; background:rgba(8,11,15,.92); backdrop-filter:blur(14px); border-top:1px solid var(--line);}
.tabbar .inner{max-width:520px; margin:0 auto; display:flex; padding:8px 6px calc(8px + env(safe-area-inset-bottom));}
.tab{flex:1; background:transparent; padding:7px 0; display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--muted); font-size:10px;}
.tab svg{width:22px; height:22px;} .tab.on{color:var(--accent);}
.empty{text-align:center; color:var(--muted); padding:26px 10px; font-size:14px;}
.reveal{animation:rise .45s both;} @keyframes rise{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}
.divider{height:1px; background:var(--line); margin:14px 0;} hr.sub{border:none; border-top:1px dashed var(--line); margin:14px 0;}
.note{width:100%; background:var(--panel2); border:1px solid var(--line); border-radius:9px; color:var(--text); padding:9px; font-family:inherit; font-size:13px; resize:vertical;}
.quote{font-style:italic; color:#AEB9C7; font-size:13.5px;} .scale{display:flex; gap:6px;}
.scale button{flex:1; padding:10px 0; border-radius:9px; background:var(--panel2); border:1px solid var(--line); font-family:'JetBrains Mono',monospace; font-weight:700;}
.scale button.on{background:var(--accent); color:var(--accent-ink); border-color:transparent;}
.field{margin:13px 0;} .field label{display:block; font-size:13px; margin-bottom:7px; color:#C6D0DC;}
.contrib{display:flex; justify-content:space-between; gap:8px; padding:8px 0; border-top:1px dashed var(--line); font-size:13px;}
.contrib:first-child{border-top:none;} .contrib .c-ef{font-family:'JetBrains Mono',monospace; color:var(--accent);}
.seg{display:flex; background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:3px; gap:3px;}
.seg button{flex:1; padding:8px; border-radius:8px; background:transparent; font-size:12px; font-weight:600; color:var(--muted);}
.seg button.on{background:var(--accent); color:var(--accent-ink);}

.lhead{position:sticky; top:0; z-index:30; background:linear-gradient(180deg,var(--panel),rgba(14,18,24,.94)); border:1px solid var(--line); border-radius:var(--r); padding:13px 16px; margin:12px 0; display:flex; justify-content:space-between; align-items:center; gap:10px; backdrop-filter:blur(8px);}

.lhead .meta{font-size:12px; color:var(--muted); margin-top:2px;}
.lhead .clk{font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; color:var(--accent); text-align:right; line-height:1;}
.lhead .prog{font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); text-align:right; margin-top:3px;}

.exmenu{display:flex; gap:6px; align-items:center;}

.stickfin .b:active{transform:translateY(1px);}
</style>

function seed(){

  return { cfgVersion:CONFIG_VERSION, settings:{sessionsPerWeek:4, units:"kg"}, muscles,
    exercises:EXERCISES.map(e=>({...e, m:{...e.m}})), sessions:[], bodyweight:[], measurements:[], photos:[], readiness:null, updatedAt:null };
}

      fresh.sessions=d.sessions||[]; fresh.bodyweight=d.bodyweight||[]; fresh.measurements=d.measurements||[]; fresh.photos=d.photos||[];

async function hydrateFromCloud(){
  if(!cloudReady()||syncing) return; syncing=true;
  try{
    const u=authUser.id;
    const [stR,exR,wR,weR,setR,mR]=await Promise.all([
      sb.from("app_settings").select("data").eq("user_id",u).maybeSingle(),
      sb.from("exercises").select("*").eq("user_id",u),
      sb.from("workouts").select("*").eq("user_id",u).order("performed_at",{ascending:true}),
      sb.from("workout_exercises").select("*").eq("user_id",u),
      sb.from("sets").select("*").eq("user_id",u),
      sb.from("measurements").select("*").eq("user_id",u).order("taken_at",{ascending:true}) ]);
    const hasCloud=(wR.data&&wR.data.length)||(exR.data&&exR.data.length)||stR.data;
    if(!hasCloud){ await migrateLocalToCloud(); syncing=false; return; }
    const rb=seed();
    if(stR.data&&stR.data.data){ const d=stR.data.data; rb.settings={...rb.settings,...(d.settings||{})}; if(d.muscles) rb.muscles=d.muscles; }
    if(exR.data&&exR.data.length){ const byId={}; exR.data.forEach(r=>byId[r.slug]=r);  // overlay saved prefs onto the full v2 library (keep new exercises)
      rb.exercises.forEach(e=>{ const r=byId[e.id]; if(r){ if(r.pref) e.pref=r.pref; if(r.avail) e.avail=r.avail; if(r.muscles&&Object.keys(r.muscles).length) e.m=r.muscles; } }); }
    const weByW={}; (weR.data||[]).forEach(we=>{(weByW[we.workout_id]=weByW[we.workout_id]||[]).push(we);});
    const setByWe={}; (setR.data||[]).forEach(s=>{(setByWe[s.workout_exercise_id]=setByWe[s.workout_exercise_id]||[]).push(s);});
    rb.sessions=(wR.data||[]).map(w=>{ const wes=(weByW[w.id]||[]).sort((a,b)=>a.order_index-b.order_index);
      return { id:w.id, completedAt:w.performed_at, startedAt:w.created_at||w.performed_at, title:w.title, mode:w.mode, synced:true,
        entries:wes.map(we=>({ exId:we.exercise_slug, sets:(setByWe[we.id]||[]).sort((a,b)=>a.set_index-b.set_index).map(s=>({weight:s.weight==null?"":Number(s.weight),reps:s.reps==null?"":s.reps,type:s.is_warmup?"warm":"work",done:!!s.completed})) })) }; });
    rb.bodyweight=[]; const snaps={};
    (mR.data||[]).forEach(r=>{ if(r.metric==="bodyweight") rb.bodyweight.push({id:r.id,date:r.taken_at,kg:Number(r.value),synced:true});
      else { (snaps[r.taken_at]=snaps[r.taken_at]||{date:r.taken_at,vals:{},synced:true}); snaps[r.taken_at].vals[r.metric]=Number(r.value); } });
    rb.measurements=Object.values(snaps); rb.photos=S.photos||[];
    const cloudIds=new Set(rb.sessions.map(s=>s.id));
    const localUnsynced=(S.sessions||[]).filter(s=>s.completedAt&&s.synced===false&&!cloudIds.has(s.id));
    rb.sessions=rb.sessions.concat(localUnsynced);
    S=rb; persistLocal();
    for(const s of localUnsynced){ await pushWorkout(s); }
  }catch(e){}
  syncing=false; render();
}
async function migrateLocalToCloud(){ if(!cloudReady()) return;

    await pushAllMeasurements(); persistLocal(); }catch(e){}

/* ============================================================================ DATE HELPERS ============================================================================ */
function startOfWeek(d=new Date()){ const x=new Date(d); x.setHours(0,0,0,0); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); return x; }
function iso(d){ return new Date(d).toISOString(); }
function dayKey(d){ const x=new Date(d); return x.getFullYear()+"-"+(x.getMonth()+1)+"-"+x.getDate(); }
function fmtDate(d){ return new Date(d).toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"}); }
function hoursBetween(a,b){ return (new Date(b)-new Date(a))/36e5; }
function fmtAgo(date){ if(!date) return "never"; const h=hoursBetween(date,new Date()); if(h<1) return "just now"; if(h<24) return Math.round(h)+"h ago"; return Math.floor(h/24)+"d ago"; }
function weekSessions(){ const s=startOfWeek(); const e=new Date(s); e.setDate(e.getDate()+7); return S.sessions.filter(x=>x.completedAt&&new Date(x.completedAt)>=s&&new Date(x.completedAt)<e); }
/* ============================================================================ DERIVED ENGINE ============================================================================ */
/* A set counts when it has weight + reps and isn't a warm-up. No RPE, no separate tick required (P4/P5). */
function isLogged(s){ return s.type!=="warm" && s.weight!=="" && s.weight!=null && s.reps!=="" && s.reps!=null && !isNaN(+s.weight) && !isNaN(+s.reps); }
function workingSets(entry){ return (entry.sets||[]).filter(isLogged); }
function primaryMuscle(ex){ let best=null; for(const [m,c] of Object.entries(ex.m)){ if(!best||c>best.c) best={m,c}; } return best?best.m:null; }

function weeklyVolume(sessions){ const list=sessions||weekSessions(); const vol={}; Object.keys(S.muscles).forEach(m=>vol[m]=0);
  list.forEach(sess=>{ (sess.entries||[]).forEach(en=>{ const ex=exById(en.exId); if(!ex) return; const n=workingSets(en).length;
    for(const [m,c] of Object.entries(ex.m)){ if(vol[m]!==undefined) vol[m]+=n*c; } }); }); return vol; }

/* P5/P8 — explainable attribution: who contributed to a muscle's number */
function muscleContrib(muscle, sessions){ const list=sessions||weekSessions(); const map={};
  list.forEach(sess=>{ (sess.entries||[]).forEach(en=>{ const ex=exById(en.exId); if(!ex||!ex.m[muscle]) return; const n=workingSets(en).length; if(!n) return;
    const c=ex.m[muscle]; const k=en.exId; if(!map[k]) map[k]={exId:k, name:ex.name, credit:c, sets:0, effective:0, dates:[]};
    map[k].sets+=n; map[k].effective+=n*c; map[k].dates.push(sess.completedAt); }); });
  const rows=Object.values(map).sort((a,b)=>b.effective-a.effective);
  const direct=rows.filter(r=>r.credit>=1).reduce((s,r)=>s+r.effective,0);
  const secondary=rows.filter(r=>r.credit<1).reduce((s,r)=>s+r.effective,0);
  return { rows, direct, secondary, total:direct+secondary }; }

/* Most-recent hard exposure per muscle: keeps date, max credit, and total working sets
   (volume lengthens recovery a little). Only direct/secondary credit (>=0.5) counts. */
function lastTrainedMap(){ const map={};
  S.sessions.filter(s=>s.completedAt).sort((a,b)=>new Date(a.completedAt)-new Date(b.completedAt)).forEach(sess=>{
    const per={};
    (sess.entries||[]).forEach(en=>{ const ex=exById(en.exId); if(!ex) return; const n=workingSets(en).length; if(!n) return;
      for(const [m,c] of Object.entries(ex.m)){ if(c<0.5) continue; const p=per[m]||(per[m]={credit:0,sets:0}); p.credit=Math.max(p.credit,c); p.sets+=n; } });
    for(const [m,p] of Object.entries(per)) map[m]={date:sess.completedAt, credit:p.credit, sets:p.sets}; });
  return map; }
/* Exact-exercise and movement-pattern recency — drive cooldowns in the recommender. */
function lastExerciseMap(){ const map={};
  S.sessions.filter(s=>s.completedAt).forEach(sess=>{ (sess.entries||[]).forEach(en=>{ if(!workingSets(en).length) return;
    const d=sess.completedAt; if(!map[en.exId]||new Date(d)>new Date(map[en.exId].date)) map[en.exId]={date:d}; }); }); return map; }
function lastPatternMap(){ const map={};
  S.sessions.filter(s=>s.completedAt).forEach(sess=>{ (sess.entries||[]).forEach(en=>{ const ex=exById(en.exId); if(!ex||!workingSets(en).length) return;
    const d=sess.completedAt; if(!map[ex.pattern]||new Date(d)>new Date(map[ex.pattern].date)) map[ex.pattern]={date:d}; }); }); return map; }

/* LAYER 1 — recovery/training status (drives colour). No RPE: working sets assumed hard.
   Recovery is the gate: a muscle below its block window must NOT be a primary target,
   regardless of weekly-volume need. */
function recWindows(m,lt){ const cfg=S.muscles[m]; const rec=cfg.rec||[cfg.size==="large"?40:24, cfg.size==="large"?64:44];
  const scale=lt.credit>=1?1:0.62;                                   // secondary credit recovers faster
  const volMult=1+Math.max(-0.15,Math.min(0.28,(lt.sets-3)*0.06));   // higher volume → slightly longer
  return { block:rec[0]*scale*volMult, caution:rec[1]*scale*volMult }; }
function recoveryStatus(m){ const lt=lastTrainedMap()[m]; if(!lt) return "untrained";
  const cfg=S.muscles[m]; const vol=weeklyVolume()[m]; const h=hoursBetween(lt.date,new Date());
  const {block,caution}=recWindows(m,lt);
  if(vol>=cfg.cap && h<caution) return "overloaded";
  if(h<block) return "recovering";
  if(h<caution) return "caution";
  return "ready"; }
/* hours until a muscle clears its block window (for "wait ~Xh" copy) */
function readyInHours(m){ const lt=lastTrainedMap()[m]; if(!lt) return 0; const {block}=recWindows(m,lt); return Math.max(0,Math.round(block-hoursBetween(lt.date,new Date()))); }
const REC_META={ untrained:{label:"Untrained",c:"var(--grey)"}, ready:{label:"Ready",c:"var(--green)"}, caution:{label:"Caution",c:"var(--amber)"}, recovering:{label:"Recovering",c:"var(--violet)"}, overloaded:{label:"Overloaded",c:"var(--red)"} };

/* LAYER 2 — goal/volume status (shown as badges) */
function goalStatus(m){ const cfg=S.muscles[m]; const v=weeklyVolume()[m];
  if(v>=cfg.cap) return {label:"Over cap",c:"var(--red)"};
  if(v>=cfg.gh) return {label:"Above target",c:"var(--amber)"};
  if(v<cfg.min) return {label:"Below min",c:"var(--blue)"};
  if(v>=cfg.gl) return {label:"On track",c:"var(--green)"};
  return {label:"Building",c:"var(--muted)"}; }

/* e1RM only trustworthy in low-rep ranges — ignore high-rep isolation sets (P10 trust fix). */
const E1RM_MAX_REPS=10;
function est1RM(w,r){ return (w>0&&r>0&&r<=E1RM_MAX_REPS)?+(w*(1+r/30)).toFixed(1):0; }
function topSetLoad(sets){ return Math.max(0,...sets.map(s=>+s.weight||0)); }
function bestSetVol(sets){ return Math.max(0,...sets.map(s=>(+s.weight||0)*(+s.reps||0))); }
function exerciseHistory(exId){ const out=[];
  S.sessions.filter(s=>s.completedAt).forEach(sess=>{ (sess.entries||[]).forEach(en=>{ if(en.exId===exId){ const ws=workingSets(en); if(ws.length) out.push({date:sess.completedAt, sessionId:sess.id, sets:ws}); } }); });
  out.sort((a,b)=>new Date(b.date)-new Date(a.date)); return out; }
function exerciseBests(exId){ let bw=0,br=0,b1=0,bv=0; exerciseHistory(exId).forEach(h=>{ let v=0;
  h.sets.forEach(s=>{ const w=+s.weight||0,r=+s.reps||0; v+=w*r; if(w>bw)bw=w; if(r>br)br=r; const e=est1RM(w,r); if(e>b1)b1=e; }); if(v>bv)bv=v; }); return {bestW:bw,bestReps:br,best1rm:b1,bestVol:bv}; }
function incrementFor(e){ return (e.m.quads||e.m.hamstrings||e.m.glutes||e.m.back_lats>=1)?5:2.5; }
function progressionFor(exId){ const e=exById(exId); const last=exerciseHistory(exId)[0];
  if(!last||!last.sets.length) return {weight:"",reps:"",note:"Find a working weight in "+e.rl+"-"+e.rh+" reps.",add:false};
  const ws=last.sets; const tw=Math.max(...ws.map(s=>+s.weight||0)); const tr=Math.max(...ws.map(s=>+s.reps||0));
  const allTop=ws.length>=2&&ws.every(s=>(+s.reps||0)>=e.rh); const inc=incrementFor(e);
  if(allTop) return {weight:tw+inc,reps:e.rl,note:"Maxed reps last time → up to "+(tw+inc)+"kg, aim "+e.rl+"+ reps.",add:true};
  return {weight:tw,reps:"",note:"Match "+tw+"kg, beat "+tr+" reps on your top set.",add:false}; }
function fatigueFlag(exId){ const h=exerciseHistory(exId).slice(0,3); if(h.length<3) return null;
  const e1=h.map(x=>Math.max(0,...x.sets.map(s=>est1RM(+s.weight||0,+s.reps||0))));
  if(e1[2]>0 && e1[0]<e1[1] && e1[1]<=e1[2]) return "Est. 1RM down two sessions — consider a lighter day or deload."; return null; }

/* RECOMMENDATION — recovery is the gate, weekly volume is the tie-breaker (P-bug fix).
   Recovering/overloaded muscles score a sentinel low and are never trainable today;
   caution muscles are heavily penalised and their volume-need boost is muted. */
const TIER_BASE={primary:100,secondary:62,maintenance:34};
function muscleScores(r){ const vol=weeklyVolume(); const wk=weekSessions().length; const remaining=Math.max(1,S.settings.sessionsPerWeek-wk); const avoid=(r&&r.avoid)||[]; const out=[];
  for(const [m,cfg] of Object.entries(S.muscles)){ const v=vol[m]; const status=recoveryStatus(m);
    const avoided=avoid.includes(m); const trainable=status!=="recovering"&&status!=="overloaded"&&!avoided;
    let score=TIER_BASE[cfg.tier];
    if(trainable){ const cautionK=status==="caution"?0.28:1;        // mute volume-need while recovering
      if(v<cfg.min) score+=85*cautionK; else if(v<cfg.gl) score+=42*cautionK; else if(v<cfg.gh) score+=16*cautionK;
      if(v>=cfg.cap) score-=130; else if(v>=cfg.cap*0.85) score-=55;
      score+=({ready:18,caution:-70,untrained:25}[status]||0);
      if(v<cfg.min&&status!=="caution") score+=38/remaining;
    } else { score=-999; }
    if(avoided) score-=1000;
    out.push({m,cfg,v,status,score,trainable}); }
  out.sort((a,b)=>b.score-a.score); return out; }
function recommend(r){ r=r||{}; const time=r.time||60; const maxEx=time<=30?3:time<=45?4:5;
  const lowEnergy=(r.energy&&r.energy<=2)||(r.sleep&&r.sleep<=2); const highSore=(r.soreness&&r.soreness>=4);
  const scored=muscleScores(r); const wk=weekSessions().length; const remaining=S.settings.sessionsPerWeek-wk;
  const belowMin=scored.filter(s=>s.v<s.cfg.min&&s.trainable);
  const pool=S.exercises.filter(e=>AVAIL_OK[e.avail]); const chosen=[]; const covered={}; const now=new Date();
  const lastExMap=lastExerciseMap(), lastPatMap=lastPatternMap(), ltMap=lastTrainedMap();
  /* relaxed=true lets the fallback pass program a caution/recovering muscle when nothing fresher exists */
  function exValue(ex,relaxed){ let val=0,bad=false,cautionLead=false;
    const lx=lastExMap[ex.id]; if(lx){ const h=hoursBetween(lx.date,now); if(h<48){ val-=110; if(h<24&&!relaxed) bad=true; } else if(h<72) val-=34; }   // exact-exercise cooldown (strongest)
    const lp=lastPatMap[ex.pattern]; if(lp){ const h=hoursBetween(lp.date,now); if(h<30) val-=55; else if(h<48) val-=22; }                          // movement-pattern cooldown
    for(const [m,c] of Object.entries(ex.m)){ const sc=scored.find(x=>x.m===m); if(!sc) continue;
      if(c>=1){ if(sc.status==="recovering"||sc.status==="overloaded"){ if(relaxed){ cautionLead=true; val-=40; } else { bad=true; } }
        else if(sc.status==="caution"){ if(relaxed){ cautionLead=true; val-=18; } else { val-=85; } } }
      else if(c>=0.5){ if(sc.status==="recovering"||sc.status==="overloaded") val-=42; else if(sc.status==="caution") val-=16; }   // secondary partial fatigue
      const usable=sc.trainable||relaxed; if(!usable) continue; const dim=(covered[m]||0)>0?0.35:1;
      val+=(sc.trainable?sc.score:Math.max(sc.score,-40))*c*dim; }
    val+=PREF_SCORE[ex.pref]*1.2;
    if(highSore&&ex.type==="compound") val-=22; if(lowEnergy&&ex.fatigue>=2.5) val-=18; return {val,bad,cautionLead}; }
  function fill(relaxed,thresh){ let safety=0;
    while(chosen.length<maxEx && safety++<60){ let best=null,bestEx=null,bestCaution=false;
      for(const ex of pool){ if(chosen.find(c=>c.exId===ex.id)) continue; const {val,bad,cautionLead}=exValue(ex,relaxed); if(bad||val<=thresh) continue; if(best===null||val>best){ best=val; bestEx=ex; bestCaution=cautionLead; } }
      if(!bestEx) break; const leadM=primaryMuscle(bestEx); const sc=scored.find(x=>x.m===leadM); let sets=2;
      if(sc&&sc.cfg.tier==="primary"&&sc.v<sc.cfg.gh&&sc.status==="ready") sets=3; if(sc&&sc.v>=sc.cfg.cap*0.85) sets=2; if(lowEnergy||highSore) sets=Math.min(sets,2);
      chosen.push({exId:bestEx.id,sets,caution:bestCaution}); for(const [m,c] of Object.entries(bestEx.m)){ if(c>=0.5) covered[m]=(covered[m]||0)+sets*c; } } }
  fill(false,0);
  if(belowMin.length){ const need=belowMin[0]; if(!chosen.some(c=>{ const e=exById(c.exId); return e.m[need.m]>=0.5; })){
    const fix=pool.filter(e=>e.m[need.m]>=0.5&&!chosen.find(c=>c.exId===e.id)&&!exValue(e,false).bad).sort((a,b)=>PREF_SCORE[b.pref]-PREF_SCORE[a.pref])[0];
    if(fix){ if(chosen.length>=maxEx) chosen.pop(); chosen.push({exId:fix.id,sets:2,caution:false}); } } }
  if(chosen.length<Math.min(maxEx,3)) fill(true,-150);   // nothing fresh left — program caution work, flagged
  let tot=chosen.reduce((s,c)=>s+c.sets,0); while(tot>15){ const b=chosen.filter(c=>c.sets===3)[0]; if(!b) break; b.sets=2; tot--; }
  /* ---- explainability ---- */
  const why=[]; const lead=Object.entries(covered).filter(([m,c])=>c>=1).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([m])=>S.muscles[m].label.toLowerCase());
  if(lead.length) why.push({t:"go",x:"Today’s focus: "+lead.join(", ")+"."});
  belowMin.slice(0,2).forEach(b=>{ if(chosen.some(c=>exById(c.exId).m[b.m]>=0.5)) why.push({t:"go",x:b.cfg.label+" was below minimum ("+b.v.toFixed(1)+"/"+b.cfg.min+") and recovered — included."}); });
  scored.filter(s=>s.status==="recovering"||s.status==="overloaded").sort((a,b)=>(b.cfg.tier==="primary")-(a.cfg.tier==="primary")).slice(0,3).forEach(s=>{ const w=readyInHours(s.m); const lt=ltMap[s.m];
    why.push({t:"neg",x:s.cfg.label+" trained "+fmtAgo(lt&&lt.date)+" — "+(s.status==="overloaded"?"at weekly cap, still ":"")+"recovering"+(w>0?", wait ~"+w+"h":"")+"."}); });
  chosen.filter(c=>c.caution).slice(0,2).forEach(c=>{ const m=primaryMuscle(exById(c.exId)); why.push({t:"warn",x:S.muscles[m].label+" still in caution window — included only because nothing fresher was available."}); });
  scored.filter(s=>s.v>=s.cfg.cap*0.85&&s.trainable&&s.status!=="caution").slice(0,1).forEach(s=>why.push({t:"warn",x:s.cfg.label+" near cap ("+s.v.toFixed(1)+"/"+s.cfg.cap+") — capped."}));
  if(remaining<=1&&wk<S.settings.sessionsPerWeek) why.push({t:"warn",x:"Only "+Math.max(0,remaining)+" session left this week — high-leverage catch-up."});
  if(highSore) why.push({t:"warn",x:"High soreness — leaning isolation, sets capped at 2."});
  if(lowEnergy) why.push({t:"warn",x:"Low energy/sleep — volume trimmed."});
  const musclesHit=Object.entries(covered).filter(([m,c])=>c>0).sort((a,b)=>b[1]-a[1]).map(([m])=>S.muscles[m].label);
  return {title:musclesHit.slice(0,3).join(" · ")||"Recovery session", why, exercises:chosen, musclesHit, time}; }

function swapSuggestions(exId){ const ex=exById(exId); if(!ex) return []; const pm=primaryMuscle(ex);
  return S.exercises.filter(e=>e.id!==exId && primaryMuscle(e)===pm && AVAIL_OK[e.avail])
    .map(e=>({e, samePattern:e.pattern===ex.pattern}))
    .sort((a,b)=>(b.samePattern-a.samePattern)||(PREF_SCORE[b.e.pref]-PREF_SCORE[a.e.pref]))
    .slice(0,6).map(x=>x.e); }
function libraryByMuscle(){ const groups={}; S.exercises.forEach(e=>{ const pm=primaryMuscle(e); (groups[pm]=groups[pm]||[]).push(e); }); return groups; }

/* P1 — ghost/prefill: suggested weight+reps so a planned set is one tap */
function ghostFor(en,si){ const e=exById(en.exId);
  const last=exerciseHistory(en.exId).filter(h=>h.sessionId!==activeSession.editingId)[0]; const prog=progressionFor(en.exId);
  let prevW="",prevR=""; for(let k=si-1;k>=0;k--){ const s=en.sets[k]; if(isLogged(s)){ prevW=+s.weight; prevR=+s.reps; break; } }
  let lw="",lr=""; if(last&&last.sets){ const ls=last.sets[si]||last.sets[last.sets.length-1]; if(ls){ lw=+ls.weight||""; lr=+ls.reps||""; } }
  const w = prevW!==""?prevW : (lw!==""?lw : (prog.weight!==""?prog.weight:"")); 
  const r = prevR!==""?prevR : (lr!==""?lr : (prog.reps!==""?prog.reps : (e?e.rl:"")));
  return {w:w===""?"":String(w), r:r===""?"":String(r)}; }

function setRow(ei,si,s){ const warm=s.type==="warm"; const g=warm?{w:"",r:""}:ghostFor(activeSession.entries[ei],si); const wEmpty=(s.weight===""||s.weight==null), rEmpty=(s.reps===""||s.reps==null);
  return '<div class="setrow '+(warm?'warm':'')+'"><span class="sn" data-snum="'+ei+'-'+si+'" title="long-press to mark warm-up">'+(warm?'W':si+1)+'</span>'
    +'<input class="inp'+(wEmpty&&g.w!==""?' ghosted':'')+'" inputmode="decimal" enterkeyhint="next" data-f="weight" data-ei="'+ei+'" data-si="'+si+'" value="'+(s.weight==null?"":s.weight)+'" placeholder="'+(g.w!==""?g.w:"–")+'">'
    +'<input class="inp'+(rEmpty&&g.r!==""?' ghosted':'')+'" inputmode="numeric" enterkeyhint="done" data-f="reps" data-ei="'+ei+'" data-si="'+si+'" value="'+(s.reps==null?"":s.reps)+'" placeholder="'+(g.r!==""?g.r:"–")+'">'
    +'<button class="chk '+(isLogged(s)?'on':'')+'" data-log="'+ei+'-'+si+'" aria-label="log set">✓</button></div>'; }
function evalWins(en,bests){ const ws=workingSets(en); if(!ws.length||bests.bestW<=0) return []; const out=[]; let mw=0,m1=0,vol=0;
  ws.forEach(s=>{ const w=+s.weight||0,r=+s.reps||0; vol+=w*r; if(w>mw)mw=w; const e=est1RM(w,r); if(e>m1)m1=e; });
  if(mw>bests.bestW) out.push({t:"WEIGHT PR",c:"pr"}); if(m1>bests.best1rm) out.push({t:"e1RM PR",c:"pr"}); if(vol>bests.bestVol) out.push({t:"VOLUME PR",c:"pr"});
  if(!out.length&&(mw>=bests.bestW||vol>=bests.bestVol*0.98)) out.push({t:"Beat last time",c:"beat"}); return out; }

function viewHistory(){ const list=S.sessions.filter(s=>s.completedAt).sort((a,b)=>new Date(b.completedAt)-new Date(a.completedAt));

/* ============================================================================ ANALYTICS ============================================================================ */
function completedSessions(){ return S.sessions.filter(s=>s.completedAt); }
function monthKey(d){ const x=new Date(d); return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0"); }
function monthLabel(k){ const [y,m]=k.split("-"); return ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][+m-1]+" "+y.slice(2); }
function periodRange(){ if(statsPeriod==="all") return null; const to=new Date(); const from=new Date(); from.setDate(from.getDate()-(+statsPeriod)); return {from,to}; }
function inPeriod(d){ const p=periodRange(); if(!p) return true; const t=new Date(d); return t>=p.from&&t<=p.to; }
function periodSessions(){ return completedSessions().filter(s=>inPeriod(s.completedAt)); }
function setsByBodyPartP(){ return weeklyVolume(periodSessions()); }
function mostUsedExercises(limit){ const cnt={}; periodSessions().forEach(s=>s.entries.forEach(en=>{ if(workingSets(en).length) cnt[en.exId]=(cnt[en.exId]||0)+1; }));
  return Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,limit||6).map(([id,n])=>({ex:exById(id),n})); }
function workoutsByMonth(){ const m={}; completedSessions().forEach(s=>{ const k=monthKey(s.completedAt); m[k]=(m[k]||0)+1; }); return m; }
function bestMonth(){ let b=null; for(const [k,v] of Object.entries(workoutsByMonth())){ if(!b||v>b.v) b={k,v}; } return b; }
function weeklyCounts(n){ const out=[]; const base=startOfWeek(); for(let i=n-1;i>=0;i--){ const s=new Date(base); s.setDate(s.getDate()-i*7); const e=new Date(s); e.setDate(e.getDate()+7);
  out.push({count:completedSessions().filter(x=>new Date(x.completedAt)>=s&&new Date(x.completedAt)<e).length, current:i===0}); } return out; }
/* Progression metric: e1RM for low-rep work; top-set load or best-set volume for
   isolation / high-rep movements where e1RM would be misleading (P10). */
function exerciseProgression(){ return S.exercises.map(e=>{ const h=exerciseHistory(e.id); if(h.length<2) return null;
  const f=h[h.length-1].sets, l=h[0].sets;
  let first=Math.max(0,...f.map(s=>est1RM(+s.weight||0,+s.reps||0))), latest=Math.max(0,...l.map(s=>est1RM(+s.weight||0,+s.reps||0))), metric="e1RM";
  if(first<=0||latest<=0){ first=topSetLoad(f); latest=topSetLoad(l); metric="top set"; }
  if(first<=0||latest<=0){ first=bestSetVol(f); latest=bestSetVol(l); metric="best vol"; }
  if(first<=0) return null; return {ex:e,first,latest,n:h.length,metric,pct:(latest-first)/first*100}; }).filter(Boolean).sort((a,b)=>b.pct-a.pct); }
function calcStreak(){ let streak=0,cursor=startOfWeek(); for(let i=0;i<26;i++){ const s=new Date(cursor); const e=new Date(s); e.setDate(e.getDate()+7);
  const n=S.sessions.filter(x=>x.completedAt&&new Date(x.completedAt)>=s&&new Date(x.completedAt)<e).length;
  if(i===0&&n<S.settings.sessionsPerWeek){ cursor.setDate(cursor.getDate()-7); continue; } if(n>=S.settings.sessionsPerWeek) streak++; else break; cursor.setDate(cursor.getDate()-7); } return streak; }

function viewStats(){ const total=completedSessions().length; const streak=calcStreak(); const bm=bestMonth();
  const pBtns=[["30","30d"],["90","90d"],["all","All"]].map(([v,l])=>'<button data-statsperiod="'+v+'" class="'+(statsPeriod===v?'on':'')+'">'+l+'</button>').join("");
  const weeks=weeklyCounts(10); const wmax=Math.max(1,...weeks.map(w=>w.count));
  const wbars=weeks.map(w=>'<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><div style="height:56px;width:100%;display:flex;align-items:flex-end"><i style="width:100%;height:'+Math.round(w.count/wmax*100)+'%;min-height:3px;background:'+(w.current?'var(--accent)':'var(--grey)')+';border-radius:4px 4px 0 0;display:block"></i></div><span class="mono" style="font-size:10px;color:var(--muted)">'+w.count+'</span></div>').join("");
  const sbp=setsByBodyPartP(); const ent=Object.entries(sbp).filter(([m,v])=>v>0).sort((a,b)=>b[1]-a[1]); const smax=Math.max(1,...ent.map(e=>e[1]));
  const tierC={primary:"var(--gold)",secondary:"var(--accent)",maintenance:"var(--muted)"};
  const sbpRows=ent.length?ent.map(([m,v])=>'<div class="exline" data-muscle-stat="'+m+'" style="padding:7px 0;cursor:pointer"><div style="flex:1"><div class="nm" style="font-size:13px">'+S.muscles[m].label+'</div><div class="bar" style="margin-top:5px"><i style="width:'+Math.round(v/smax*100)+'%;background:'+tierC[S.muscles[m].tier]+'"></i></div></div><span class="mono" style="margin-left:10px">'+v.toFixed(1)+'</span><span class="muted" style="margin-left:8px">›</span></div>').join(""):'<div class="empty" style="padding:16px">No sets in this period.</div>';
  const mu=mostUsedExercises(6); const muRows=mu.length?mu.map(x=>'<div class="exline" data-exhist="'+x.ex.id+'" style="padding:7px 0;cursor:pointer"><div class="nm" style="font-size:13px">'+(x.ex?x.ex.name:'?')+'</div><span class="sets">'+x.n+' '+(x.n===1?'session':'sessions')+'</span></div>').join(""):'<div class="empty" style="padding:16px">Nothing logged.</div>';
  const prog=exerciseProgression().slice(0,6); const progRows=prog.length?prog.map(p=>{ const up=p.pct>=0,c=up?'var(--green)':'var(--red)';
    return '<div class="exline" data-exhist="'+p.ex.id+'" style="padding:7px 0;cursor:pointer"><div><div class="nm" style="font-size:13px">'+p.ex.name+'</div><div class="histline">'+p.first.toFixed(0)+' → '+p.latest.toFixed(0)+'kg '+p.metric+' · '+p.n+' sessions</div></div><span class="statuspill" style="background:'+c+'22;color:'+c+'">'+(up?'▲':'▼')+' '+Math.abs(p.pct).toFixed(0)+'%</span></div>'; }).join(""):'<div class="empty" style="padding:16px">Log an exercise twice to see progression.</div>';
  return '<div class="card"><div class="kpi"><div class="k" data-act="goto-history"><b>'+total+'</b><span>workouts</span></div><div class="k" data-act="goto-history"><b>'+streak+'</b><span>week streak</span></div><div class="k" data-act="goto-history"><b style="font-size:15px;line-height:2">'+(bm?monthLabel(bm.k):'\u2014')+'</b><span>best month'+(bm?' · '+bm.v:'')+'</span></div></div></div>'
    +'<div class="card"><div class="tiny">Workouts · last 10 weeks</div><div style="display:flex;gap:4px;margin-top:10px;align-items:flex-end">'+wbars+'</div></div>'
    +'<div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px"><span class="tiny">Window</span><div class="seg" style="width:60%">'+pBtns+'</div></div>'
    +'<div class="card"><div class="tiny">Sets by body part · tap any row to explain this '+(statsPeriod==="all"?"period":statsPeriod+"-day window")+'</div><div style="margin-top:8px">'+sbpRows+'</div></div>'
    +'<div class="card"><div class="tiny">Most-used exercises</div><div style="margin-top:6px">'+muRows+'</div></div>'
    +'<div class="card"><div class="tiny">Progression · biggest movers (e1RM)</div><div style="margin-top:6px">'+progRows+'</div></div>'; }

/* ---------------- BODY (P6 two-layer + P7 grid + P5 attribution) ---------------- */
const BODY_GROUPS=[["Chest & push",["upper_chest","chest","triceps","front_delts"]],["Back & pull",["back_lats","upper_back","biceps"]],["Delts",["side_delts","rear_delts"]],["Legs",["quads","hamstrings","glutes","calves"]],["Core & other",["abs","lower_back","forearms"]]];
const TIER_RANK={primary:0,secondary:1,maintenance:2};
function viewBody(){
  const groups=BODY_GROUPS.map(([title,ms])=>{ const ordered=ms.slice().sort((a,b)=>TIER_RANK[S.muscles[a].tier]-TIER_RANK[S.muscles[b].tier]);
    const cards=ordered.map(m=>{ const cfg=S.muscles[m]; const recm=REC_META[recoveryStatus(m)]; const v=weeklyVolume()[m];
      const below=v<cfg.min, over=v>=cfg.cap, above=v>=cfg.gh;
      const barC=below?"var(--blue)":over?"var(--red)":above?"var(--amber)":"var(--green)";
      const fill=Math.max(4,Math.min(100,Math.round(v/cfg.cap*100))); const tgt=Math.round(cfg.gl/cfg.cap*100);
      const exc=below?'<span class="gb" style="background:var(--blue)22;color:var(--blue)">Below min</span>':over?'<span class="gb" style="background:var(--red)22;color:var(--red)">Over cap</span>':'';
      return '<div class="mcard" data-muscle="'+m+'"><div class="bartop" style="background:'+recm.c+'"></div>'
        +'<div class="mlabel">'+cfg.label+'</div>'
        +'<div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:3px"><span style="font-size:10.5px;font-weight:700;color:'+recm.c+'">'+recm.label+'</span><span class="mono" style="font-size:12px;color:var(--muted)">'+v.toFixed(1)+'/'+cfg.gh+'</span></div>'
        +'<div class="bar" style="margin-top:7px"><i style="width:'+fill+'%;background:'+barC+'"></i><span class="capmark" style="left:'+tgt+'%"></span></div>'
        +(exc?'<div style="margin-top:7px">'+exc+'</div>':'')
        +'</div>'; }).join("");
    return '<div class="muted tiny" style="margin:14px 2px 2px">'+title+'</div><div class="mgrid">'+cards+'</div>'; }).join("");

function startRest(sec,name){ clearInterval(restTimer); let left=sec; const mount=document.getElementById("restmount");
  function paint(){ mount.innerHTML='<div class="rest"><div class="pill"><span class="muted" style="font-size:12px">'+(name||"Rest")+'</span><span class="t mono">'+Math.floor(left/60)+":"+String(left%60).padStart(2,"0")+'</span><button data-restadd>+30</button><button data-restskip>skip</button></div></div>';
    mount.querySelector("[data-restadd]").onclick=()=>{ left+=30; paint(); }; mount.querySelector("[data-restskip]").onclick=()=>{ clearInterval(restTimer); mount.innerHTML=""; }; }
  paint(); restTimer=setInterval(()=>{ left--; if(left<=0){ clearInterval(restTimer); mount.innerHTML=""; try{ navigator.vibrate&&navigator.vibrate([200,80,200]); }catch(e){} return; } paint(); },1000); }
function renderRest(){ /* timer self-manages its mount */ }
function tickClock(){ const el=document.getElementById("elapsed"); if(!el||!activeSession){ stopClock(); return; } const sec=Math.max(0,Math.floor((Date.now()-new Date(activeSession.startedAt))/1000)); el.textContent=Math.floor(sec/60)+":"+String(sec%60).padStart(2,"0"); const sp=document.getElementById("setprog"); if(sp){ const c=loggerCounts(); sp.textContent=c.done+"/"+c.total; } }
function startClock(){ stopClock(); tickClock(); loggerClock=setInterval(tickClock,1000); }
function stopClock(){ if(loggerClock){ clearInterval(loggerClock); loggerClock=null; } }
function renderFinish(){ const m=document.getElementById("finmount"); if(!m) return;
  if(activeSession&&viewingLogger){ const c=loggerCounts(); const isEdit=activeSession.mode==="edit";
    if(c.done>=1||isEdit){ m.innerHTML='<div class="stickfin"><button class="b" data-finish>'+(isEdit?"Save changes":"Finish workout")+' · '+c.done+' set'+(c.done===1?"":"s")+'</button></div>'; m.querySelector("[data-finish]").onclick=finishWorkout; return; } }
  m.innerHTML=""; }

/* ============================================================================ WIRING ============================================================================ */
function deriveTitle(entries){ const ms={}; entries.forEach(en=>{ const ex=exById(en.exId); const n=workingSets(en).length; if(!ex||!n) return; const pm=primaryMuscle(ex); if(pm) ms[pm]=(ms[pm]||0)+n; });
  const top=Object.entries(ms).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([m])=>S.muscles[m]?S.muscles[m].label:m); return top.length?top.join(" · "):"Workout"; }
function startSession(rec){ loggerOpen={}; const entries=(rec?rec.exercises:[]).map(c=>{ const e=exById(c.exId); return { exId:c.exId, sets:Array.from({length:c.sets||e.sl||2},()=>({weight:"",reps:"",type:"work",done:false})) }; });
  activeSession={ id:uid(), startedAt:iso(new Date()), dateISO:new Date().toISOString().slice(0,10), title:rec?rec.title:"Empty workout", mode:rec?"adaptive":"manual", entries }; viewingLogger=true; pendingRec=null; saveActive();
  try{ history.pushState({iron:"workout"},""); }catch(e){} route="today"; render(); }
function finishWorkout(){ const logged=activeSession.entries.reduce((n,en)=>n+workingSets(en).length,0);
  if(!logged){ confirmSheet("Nothing’s been logged yet. Finish this workout anyway?","Finish anyway",()=>doFinish(),{danger:true,title:"Finish empty workout?"}); return; }
  doFinish(); }
function doFinish(){ const d=activeSession.dateISO; const base=d?new Date(d+"T12:00:00"):new Date(); let saved=null;
  if(activeSession.mode==="edit"){ const idx=S.sessions.findIndex(s=>s.id===activeSession.editingId); const orig=idx>=0?S.sessions[idx]:null;
    const completedAt=orig&&dayKey(orig.completedAt)===dayKey(base)?orig.completedAt:iso(base);
    const updated={...activeSession, id:activeSession.editingId, completedAt, mode:"edit"}; delete updated.editingId; delete updated.dateISO;
    if(idx>=0) S.sessions[idx]=updated; persistLocal(); pushWorkout(updated); saved=updated; }
  else { if(!activeSession.title||activeSession.title==="Empty workout") activeSession.title=deriveTitle(activeSession.entries);
    const sess={ id:activeSession.id, startedAt:activeSession.startedAt, completedAt:iso(base), title:activeSession.title, mode:activeSession.mode, entries:activeSession.entries, synced:false };
    S.sessions.push(sess); persistLocal(); pushWorkout(sess); if(readinessDraft&&route!=="settings") pushCheckin(readinessDraft,sess.id); saved=sess; }
  const recap=buildRecap(saved); activeSession=null; viewingLogger=false; loggerOpen={}; saveActive(); stopClock(); go("today"); openSheet("recap",recap); }
function buildRecap(sess){ const setsN=sess.entries.reduce((a,en)=>a+workingSets(en).length,0);
  const dur=sess.startedAt?Math.max(1,Math.round(hoursBetween(sess.startedAt,sess.completedAt)*60)):null;
  const muscles=[...new Set(sess.entries.flatMap(en=>{ const ex=exById(en.exId); const n=workingSets(en).length; return (ex&&n)?Object.entries(ex.m).filter(([m,c])=>c>=0.5).map(([m])=>m):[]; }))].map(m=>S.muscles[m]?S.muscles[m].label:m);
  const prs=[]; sess.entries.forEach(en=>{ const ws=workingSets(en); if(!ws.length) return; const ex=exById(en.exId); if(!ex) return;
    const hist=exerciseHistory(en.exId).filter(h=>h.sessionId!==sess.id); let bw=0,b1=0,bv=0; hist.forEach(h=>{ let v=0; h.sets.forEach(s=>{const w=+s.weight||0,r=+s.reps||0; v+=w*r; if(w>bw)bw=w; const e=est1RM(w,r); if(e>b1)b1=e;}); if(v>bv)bv=v; });
    let mw=0,m1=0,vol=0; ws.forEach(s=>{const w=+s.weight||0,r=+s.reps||0; vol+=w*r; if(w>mw)mw=w; const e=est1RM(w,r); if(e>m1)m1=e;});
    if(bw>0&&mw>bw) prs.push(ex.name+" — "+mw+"kg top set"); else if(b1>0&&m1>b1) prs.push(ex.name+" — e1RM "+m1.toFixed(0)+"kg"); else if(bv>0&&vol>bv) prs.push(ex.name+" — "+vol+"kg volume"); });
  const vbp=weeklyVolume([sess]); const parts=Object.entries(vbp).filter(([m,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([m,v])=>({label:S.muscles[m].label,v}));
  return {id:sess.id, setsN, exN:sess.entries.filter(en=>workingSets(en).length).length, dur, muscles, prs, parts, title:sess.title}; }
function editWorkout(id){ const s=S.sessions.find(x=>x.id===id); if(!s) return; loggerOpen={}; activeSession={ id:uid(), editingId:id, startedAt:s.startedAt||s.completedAt, dateISO:new Date(s.completedAt).toISOString().slice(0,10), title:s.title, mode:"edit", entries:JSON.parse(JSON.stringify(s.entries)) }; viewingLogger=true; saveActive(); go("today"); }
function duplicateWorkout(id){ const s=S.sessions.find(x=>x.id===id); if(!s) return; loggerOpen={}; activeSession={ id:uid(), startedAt:iso(new Date()), dateISO:new Date().toISOString().slice(0,10), title:s.title, mode:"manual", entries:s.entries.map(en=>({exId:en.exId, sets:en.sets.map(()=>({weight:"",reps:"",type:"work",done:false}))})) }; viewingLogger=true; saveActive(); try{ history.pushState({iron:"workout"},""); }catch(e){} go("today"); }
function deleteWorkout(id){ confirmSheet("Delete this workout permanently? Stats, volume and muscle status will update.","Delete",()=>{ S.sessions=S.sessions.filter(x=>x.id!==id); persistLocal(); deleteWorkoutCloud(id); render(); },{danger:true,title:"Delete workout?"}); }

  document.querySelectorAll("[data-more]").forEach(b=>b.onclick=()=>openSheet("exmenu",+b.dataset.more));
  document.querySelectorAll("[data-addset]").forEach(b=>b.onclick=()=>{ const ei=+b.dataset.addset; activeSession.entries[ei].sets.push({weight:"",reps:"",type:"work",done:false}); saveActive(); render(); });
  document.querySelectorAll("[data-rest]").forEach(b=>b.onclick=()=>startRest(+b.dataset.rest,b.dataset.exname));
  document.querySelectorAll("[data-swap]").forEach(b=>b.onclick=()=>openSheet("swap",+b.dataset.swap));
  // history
  document.querySelectorAll("[data-openw]").forEach(b=>b.onclick=()=>openSheet("exwk",b.dataset.openw));
  document.querySelectorAll("[data-editw]").forEach(b=>b.onclick=()=>editWorkout(b.dataset.editw));
  document.querySelectorAll("[data-dupw]").forEach(b=>b.onclick=()=>duplicateWorkout(b.dataset.dupw));
  document.querySelectorAll("[data-delw]").forEach(b=>b.onclick=()=>deleteWorkout(b.dataset.delw));
  // stats drilldowns
  document.querySelectorAll("[data-statsperiod]").forEach(b=>b.onclick=()=>{ statsPeriod=b.dataset.statsperiod; render(); });
  document.querySelectorAll("[data-muscle]").forEach(b=>b.onclick=()=>{ bodyDetail=b.dataset.muscle; route="body"; render(); setTimeout(()=>{ const d=document.getElementById("bodydetail"); if(d) d.scrollIntoView({behavior:"smooth",block:"center"}); },60); });
  document.querySelectorAll("[data-muscle-stat]").forEach(b=>b.onclick=()=>openSheet("mperiod",b.dataset.muscleStat));
  document.querySelectorAll("[data-exhist]").forEach(b=>b.onclick=()=>openSheet("exhist",b.dataset.exhist));
  document.querySelectorAll("[data-closedetail]").forEach(b=>b.onclick=()=>{ bodyDetail=null; render(); });
  // settings
  document.querySelectorAll("[data-pref]").forEach(b=>b.onclick=()=>{ const e=exById(b.dataset.pref); const order=["love","like","neutral","avoid"]; e.pref=order[(order.indexOf(e.pref)+1)%4]; save(); pushExercisePref(e); render(); });
  document.querySelectorAll("[data-avail]").forEach(b=>b.onclick=()=>{ const e=exById(b.dataset.avail); const order=["always","usually","sometimes","rarely","no"]; e.avail=order[(order.indexOf(e.avail)+1)%5]; save(); pushExercisePref(e); render(); });
  act("logbw",()=>{ const v=+document.getElementById("bwInput").value; if(v>0){ const row={id:uid(),date:iso(new Date()),kg:v,synced:false}; S.bodyweight.push(row); save(); pushMeasurementRow(row.id,row.date,"bodyweight",v); render(); } });
  act("export",()=>{ const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="iron-arc-backup-"+dayKey(new Date())+".json"; a.click(); });
  act("import",()=>document.getElementById("importFile").click());
  const imp=document.getElementById("importFile"); if(imp) imp.onchange=(e)=>{ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>{ try{ const d=JSON.parse(r.result); if(d.sessions){ S=d; persistLocal(); migrateLocalToCloud(); render(); alert("Imported."); } }catch(err){ alert("Invalid backup file."); } }; r.readAsText(f); };
}

/* ============================================================================ BOOT — autosave recovery + back-guard + session ============================================================================ */
activeSession=loadActive(); if(activeSession) viewingLogger=false;   // P1: recover unfinished workout, show resume banner
window.addEventListener("beforeunload",(e)=>{ if(activeSession && activeSession.entries.reduce((n,en)=>n+workingSets(en).length,0)>0){ e.preventDefault(); e.returnValue=""; } });
window.addEventListener("popstate",()=>{ if(activeSession && viewingLogger){ try{ history.pushState({iron:"workout"},""); }catch(e){}
    confirmSheet("Your workout is saved — you can pick it back up from Today whenever you like.","Leave (it’s saved)",()=>{ viewingLogger=false; saveActive(); render(); },{title:"Leave this workout?"}); } });
if(sb){ sb.auth.getSession().then(({data})=>{ authUser=data.session?data.session.user:null; if(authUser) afterAuth(); else render(); });
  sb.auth.onAuthStateChange((_e,session)=>{ const was=authUser&&authUser.id; authUser=session?session.user:null; if(authUser&&authUser.id!==was) afterAuth(); else if(!authUser) render(); }); }
else { render(); }
</script>
